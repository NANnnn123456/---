<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>航天少年 · 星际课堂</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0b1022;  /* 深空蓝 */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 12px 8px;
            position: relative;
            background-image: radial-gradient(circle at 30% 40%, #1a2f4a, #030614);
        }

        .app {
            max-width: 1400px;
            width: 100%;
            background: rgba(20, 35, 60, 0.6);
            backdrop-filter: blur(3px);
            border-radius: 32px 32px 24px 24px;
            box-shadow: 0 8px 20px rgba(0, 10, 30, 0.8), 0 0 0 2px #4d6d9c inset;
            padding: 16px 12px;
            border: 1px solid #7f9fd5;
        }

        /* 标题栏 + 工具条 — 太空舱风格 */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 10px;
            margin-bottom: 20px;
            background: #1d3249;
            padding: 12px 18px;
            border-radius: 60px 60px 30px 30px;
            box-shadow: 0 6px 0 #0f1a2a, 0 0 0 2px #8bb2e6 inset;
            border: 1px solid #b3d4ff;
        }

        .header h1 {
            font-size: 1.8rem;
            color: #f9e57c;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0 #1f4d8a;
            margin-right: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        select, button {
            font-size: 1.1rem;
            padding: 10px 18px;
            border-radius: 40px;
            border: 2px solid #9fc0f0;
            background: #233a5c;
            color: #f0f9ff;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 0 #0d1e34;
            transition: 0.1s ease;
            min-height: 48px;
            min-width: 48px;
        }

        select:active, button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0d1e34;
        }

        .group-score-panel {
            background: #192f47;
            padding: 14px 10px;
            border-radius: 40px;
            margin-bottom: 20px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
            box-shadow: inset 0 2px 8px #2f4b6e;
            border: 1px solid #618ac0;
        }

        .group-score-wrapper {
            display: inline-flex;
            gap: 18px;
            padding: 0 8px;
        }

        .group-score-item {
            background: #243e5c;
            border-radius: 36px;
            padding: 12px 26px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #f3eacb;
            box-shadow: 0 4px 0 #536e96;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #b3ceff;
        }

        .group-score-item span {
            background: #f9c74f;
            color: #1a2b3c;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }

        .groups-container {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 8px 4px 20px 4px;
            scroll-snap-type: x mandatory;
        }

        .group-card {
            flex: 0 0 auto;
            width: 300px;
            max-width: 340px;
            min-width: 270px;
            background: #1d3853;
            border-radius: 40px;
            padding: 20px 14px;
            box-shadow: 0 12px 0 #0b1d30, 0 8px 12px rgba(0,0,0,0.6);
            scroll-snap-align: start;
            border: 3px solid #7699cf;
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2e5170;
            border-radius: 50px;
            padding: 8px 16px;
            margin-bottom: 20px;
            color: #fff6cf;
            font-weight: 600;
            border: 2px solid #b3d6ff;
        }

        .group-header .group-title {
            font-size: 1.3rem;
        }

        .group-stars {
            font-size: 1.8rem;
            line-height: 1;
            color: #ffdb8e;
        }

        .plant-all-btn {
            background: #ffaa33;
            border: 2px solid #c57f1e;
            color: #1a293b;
            font-size: 0.95rem;
            padding: 8px 14px;
            border-radius: 30px;
            box-shadow: 0 3px 0 #9f621b;
            min-height: 40px;
            font-weight: 700;
        }

        .seats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px 8px;
        }

        .seat-card {
            background: #233f60;
            border-radius: 30px;
            padding: 14px 6px 10px 6px;
            box-shadow: inset 0 -4px 0 #143047, 0 6px 0 #091725;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: 0.2s;
            border: 2px solid #8fb0dd;
            position: relative;
        }

        .seat-card.flash-gold {
            animation: starFlash 0.6s ease 2;
        }

        @keyframes starFlash {
            0% { background: #233f60; box-shadow: 0 0 0 0 #f9e57c; }
            30% { background: #4f6e9b; box-shadow: 0 0 20px 8px #ffd966; border-color: #ffe484; }
            70% { background: #7393c0; box-shadow: 0 0 30px 12px #fad05c; }
            100% { background: #233f60; box-shadow: 0 0 0 0 gold; }
        }

        .seat-number {
            font-weight: 800;
            font-size: 1rem;
            background: #f4b642;
            color: #1b283b;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 4px;
            border: 2px solid #ffe084;
        }

        .score-badge {
            font-size: 0.8rem;
            background: #2c5282;
            color: white;
            padding: 2px 8px;
            border-radius: 30px;
            margin-top: 2px;
            margin-bottom: 4px;
            font-weight: 600;
            border: 1px solid #9bbcf0;
        }

        .herb-icon {
            width: 56px;
            height: 56px;
            margin: 2px 0;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.6));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .herb-name {
            font-weight: 600;
            background: #1c3e61;
            color: #f4e9c0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin: 6px 0 8px;
            border: 1px solid #aac2ea;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .action-buttons {
            display: flex;
            gap: 4px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            background: #dfeefe;
            border: 2px solid #4675a8;
            border-radius: 40px;
            font-size: 1.2rem;
            padding: 8px 6px;
            min-width: 44px;
            min-height: 44px;
            box-shadow: 0 3px 0 #29517a;
            transition: 0.1s;
            line-height: 1;
            cursor: pointer;
            color: #0a1d2f;
        }

        .action-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        .rank-panel {
            background: #1e3b5a;
            border-radius: 40px;
            margin-top: 20px;
            padding: 20px 16px;
            border: 4px solid #b49450;
            display: none;
        }

        .rank-panel.show {
            display: block;
        }

        .rank-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: space-around;
        }

        .rank-col {
            background: #0e2942;
            border-radius: 32px;
            padding: 16px;
            flex: 1 1 200px;
            box-shadow: inset 0 0 0 2px #557db8;
            color: #e9f0ff;
        }

        .rank-col h3 {
            background: #f7b731;
            color: #121f33;
            border-radius: 40px;
            padding: 10px 20px;
            text-align: center;
            margin-bottom: 16px;
            border: 2px solid #fff0b5;
        }

        .rank-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .rank-list li {
            display: flex;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px dashed #7b98c2;
            font-weight: 500;
            align-items: center;
        }

        .rank-item-icon {
            width: 30px;
            height: 30px;
            margin-right: 8px;
        }

        .instruction-panel {
            background: #233f61;
            border-radius: 48px;
            margin: 20px 0;
            padding: 24px 20px;
            border: 5px solid #dbb45c;
            display: none;
            box-shadow: 0 8px 0 #624f28;
        }

        .instruction-panel.show {
            display: block;
        }

        .instruction-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            justify-content: center;
        }

        .instruction-text {
            background: #f4efd8;
            border-radius: 40px;
            padding: 24px;
            font-size: 1.2rem;
            line-height: 2;
            box-shadow: inset 0 0 0 3px #9e874b;
            max-width: 500px;
            color: #102531;
        }

        .instruction-text p {
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .instruction-icon {
            font-size: 2rem;
        }

        .reset-btn {
            background: #8b5f3c;
            border-color: #d49c5c;
        }

        .celebration-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .celebration-message {
            background: #ffdf87;
            border-radius: 60px;
            padding: 24px 48px;
            font-size: 2.2rem;
            font-weight: 800;
            color: #0f3460;
            box-shadow: 0 20px 0 #a05f1a, 0 30px 30px rgba(0,0,0,0.5);
            transform: rotate(-2deg);
            border: 6px solid gold;
            animation: bounce 0.5s infinite alternate;
            text-align: center;
            border: 4px solid white;
        }

        .confetti-flowers {
            font-size: 3rem;
            margin-top: 20px;
            letter-spacing: 20px;
            animation: spin 3s linear infinite;
        }

        @keyframes bounce {
            from { transform: scale(1) rotate(-2deg); }
            to { transform: scale(1.1) rotate(0deg); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer-decoration {
            text-align: center;
            font-size: 2rem;
            opacity: 0.5;
            margin-top: 10px;
            color: #9bbef0;
        }

        button, .action-btn, select {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="header">
        <h1><span>🚀</span> 航天少年 · 星际课堂</h1>
        <div class="toolbar">
            <select id="classSelect">
                <!-- 三年级 1~8班 -->
                <option value="c3_1">三年级1班</option>
                <option value="c3_2">三年级2班</option>
                <option value="c3_3">三年级3班</option>
                <option value="c3_4">三年级4班</option>
                <option value="c3_5">三年级5班</option>
                <option value="c3_6">三年级6班</option>
                <option value="c3_7">三年级7班</option>
                <option value="c3_8">三年级8班</option>
                <!-- 四年级 1~7班 -->
                <option value="c4_1">四年级1班</option>
                <option value="c4_2">四年级2班</option>
                <option value="c4_3">四年级3班</option>
                <option value="c4_4">四年级4班</option>
                <option value="c4_5">四年级5班</option>
                <option value="c4_6">四年级6班</option>
                <option value="c4_7">四年级7班</option>
            </select>
            <button id="saveBtn">💾 存档</button>
            <button id="resetBtn" class="reset-btn">🔄 重置</button>
            <button id="rankToggleBtn">🏆 星榜</button>
            <button id="instructionBtn">📘 任务说明</button>
        </div>
    </div>

    <div class="group-score-panel" id="groupScorePanel">
        <div class="group-score-wrapper" id="groupScoreList"></div>
    </div>

    <div class="instruction-panel" id="instructionPanel">
        <div class="instruction-content">
            <div class="instruction-text">
                <p><span class="instruction-icon">🚀</span> 发射：空发射台得1分(小火箭)</p>
                <p><span class="instruction-icon">✨</span> 升级：积分+1，升至3分闪耀星光</p>
                <p><span class="instruction-icon">🔽</span> 失误：积分-1 (最低0)</p>
                <p><span class="instruction-icon">🗑️</span> 清空：放弃任务，积分归零</p>
                <p><span class="instruction-icon">👨‍🚀</span> 全组发射：组内所有空发射台+1分</p>
                <p><span class="instruction-icon">🛰️</span> 9分后随机珍稀航天器，30分后随机荣誉徽章</p>
                <p><span class="instruction-icon">🔊</span> 加减分模拟火箭音效</p>
                <p><span class="instruction-icon">🏅</span> 首次达到30分，全屏庆祝“航天小英雄”</p>
            </div>
            <div style="font-size:5rem;">🌌🚀🛸</div>
        </div>
    </div>

    <div class="groups-container" id="groupsContainer"></div>

    <div class="rank-panel" id="rankPanel">
        <div class="rank-columns">
            <div class="rank-col">
                <h3>🚀 小组能量榜</h3>
                <ul class="rank-list" id="groupRankList"></ul>
            </div>
            <div class="rank-col">
                <h3>👩‍🚀 个人星绩榜</h3>
                <ul class="rank-list" id="personalRankList"></ul>
            </div>
        </div>
    </div>

    <div id="celebrationOverlay" class="celebration-overlay" style="display: none;">
        <div class="celebration-message">🎉 航天小英雄 🎉</div>
        <div class="confetti-flowers">🚀🌕🛰️⭐👨‍🚀🔭</div>
    </div>

    <div class="footer-decoration">✦ ✦ ✦ 星辰大海 ✦ ✦ ✦</div>
</div>

<script>
    (function(){
        // ---------- 音效系统 (保留，火箭升空/降落感) ----------
        let audioCtx = null;
        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) { console.warn('Web Audio不可用'); }
        }

        function playSound(type, duration = 1.0) {
            initAudio();
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => generateSound(type, duration));
            } else if (audioCtx.state === 'running') {
                generateSound(type, duration);
            }
        }

        function generateSound(type, duration) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const gainNode = audioCtx.createGain();
            gainNode.connect(audioCtx.destination);
            gainNode.gain.setValueAtTime(0.15, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + duration);

            if (type === 'add') {
                // 上升音阶 (火箭升空)
                for (let i = 0; i < 5; i++) {
                    const osc = audioCtx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = 440 + i * 110;
                    osc.connect(gainNode);
                    osc.start(now + i * 0.12);
                    osc.stop(now + 0.2 + i * 0.12);
                }
            } else {
                // 下降音阶 (降落/失误)
                for (let i = 0; i < 5; i++) {
                    const osc = audioCtx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = 660 - i * 120;
                    osc.connect(gainNode);
                    osc.start(now + i * 0.12);
                    osc.stop(now + 0.2 + i * 0.12);
                }
            }
        }

        // ---------- 航天物品池 ----------
        const BASE_ITEMS = ["小火箭", "人造卫星", "宇航服", "望远镜", "月球车", "航天飞机", "空间站舱", "太空食品"]; // 1-8
        const RARE_ITEMS = [
            "哈勃望远镜", "火星车", "国际空间站", "嫦娥探测器", "天问一号", "神舟飞船", "玉兔号", "北斗卫星", "长征火箭"
        ]; // 9-29
        const HONOR_ITEMS = [
            "航天员勋章", "火箭模型", "星球仪", "太空种子", "任务手册", "控制台", "太空笔", "飞行徽章", "太阳系图"
        ]; // >=30

        // 根据分数和座位号生成物品名称和图标
        function getSeatDisplay(score, seatIdx) {
            if (score === 0) {
                return { name: "发射台", icon: getIconForName("发射台", seatIdx) };
            } else if (score <= 8) {
                let name = BASE_ITEMS[score-1];
                return { name, icon: getIconForName(name, seatIdx) };
            } else if (score <= 29) {
                let pool = RARE_ITEMS;
                let idx = (seatIdx * 131 + score * 37) % pool.length;
                let name = pool[idx];
                return { name, icon: getIconForName(name, seatIdx) };
            } else {
                let pool = HONOR_ITEMS;
                let idx = (seatIdx * 131 + score * 37) % pool.length;
                let name = pool[idx];
                return { name, icon: getIconForName(name, seatIdx) };
            }
        }

        // 生成航天风格图标 (圆形+文字符号)
        function getIconForName(name, seatIdx) {
            const colorMap = {
                "发射台": "#5f7d9c",
                "小火箭": "#e67e22",
                "人造卫星": "#3498db",
                "宇航服": "#ecf0f1",
                "望远镜": "#2ecc71",
                "月球车": "#b0a88c",
                "航天飞机": "#95a5a6",
                "空间站舱": "#f1c40f",
                "太空食品": "#e67e22",
                "哈勃望远镜": "#2980b9",
                "火星车": "#e67e22",
                "国际空间站": "#2c3e50",
                "嫦娥探测器": "#d35400",
                "天问一号": "#c0392b",
                "神舟飞船": "#27ae60",
                "玉兔号": "#f39c12",
                "北斗卫星": "#3498db",
                "长征火箭": "#e74c3c",
                "航天员勋章": "#f1c40f",
                "火箭模型": "#e67e22",
                "星球仪": "#16a085",
                "太空种子": "#27ae60",
                "任务手册": "#7f8c8d",
                "控制台": "#34495e",
                "太空笔": "#ecf0f1",
                "飞行徽章": "#f39c12",
                "太阳系图": "#9b59b6"
            };
            let color = colorMap[name] || "#3a6ea5";
            // 取前两个字符作为符号（或特殊符号）
            let symbol = name.substring(0,2);
            // 针对特殊名称优化
            if (name.includes("火箭")) symbol = "🚀";
            else if (name.includes("卫星")) symbol = "🛰️";
            else if (name.includes("宇航")) symbol = "👩‍🚀";
            else if (name.includes("月球")) symbol = "🌕";
            else if (name.includes("空间站")) symbol = "🛸";
            else if (name.includes("勋章")) symbol = "🏅";
            // 如果包含emoji则用，否则用文字
            return `<svg viewBox="0 0 40 40" width="40" height="40"><circle cx="20" cy="20" r="16" fill="${color}" stroke="#1b3b5c" stroke-width="2"/><text x="20" y="28" font-size="16" text-anchor="middle" fill="white" font-weight="bold">${symbol}</text></svg>`;
        }

        // ---------- 全局状态 ----------
        // 班级映射：所有班级都用数组存储
        const classKeys = [
            "c3_1","c3_2","c3_3","c3_4","c3_5","c3_6","c3_7","c3_8",
            "c4_1","c4_2","c4_3","c4_4","c4_5","c4_6","c4_7"
        ];
        let classData = {};
        classKeys.forEach(key => classData[key] = new Array(54).fill(0));

        let currentClass = 'c3_1';
        let lastUpgradedTo3Seat = null;
        let celebrationLock = false;
        let celebrationTimer = null;

        // 从localStorage加载
        function loadFromStorage() {
            try {
                const saved = localStorage.getItem('spaceClassData_v1');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    for (let cls in parsed) {
                        if (classData.hasOwnProperty(cls) && Array.isArray(parsed[cls]) && parsed[cls].length === 54) {
                            classData[cls] = parsed[cls];
                        }
                    }
                }
            } catch (e) {}
        }

        function saveToStorage() {
            localStorage.setItem('spaceClassData_v1', JSON.stringify(classData));
        }

        function getCurrentSeats() {
            return classData[currentClass];
        }

        // 检查并触发30分庆祝
        function checkAndCelebrate(newScore) {
            if (celebrationLock) return;
            if (newScore >= 30) {
                triggerCelebration();
            }
        }

        function triggerCelebration() {
            if (celebrationLock) return;
            celebrationLock = true;
            const overlay = document.getElementById('celebrationOverlay');
            overlay.style.display = 'flex';

            playSound('add', 5); // 欢乐长音

            if (celebrationTimer) clearTimeout(celebrationTimer);
            celebrationTimer = setTimeout(() => {
                overlay.style.display = 'none';
                celebrationLock = false;
            }, 5000);
        }

        // 小组总分
        function getGroupScores() {
            const seats = getCurrentSeats();
            let groupScores = new Array(9).fill(0);
            for (let i = 0; i < 54; i++) {
                groupScores[Math.floor(i / 6)] += seats[i];
            }
            return groupScores;
        }

        function isGroupAllAbove3(groupIdx) {
            const seats = getCurrentSeats();
            for (let i = 0; i < 6; i++) {
                if (seats[groupIdx * 6 + i] < 3) return false;
            }
            return true;
        }

        // 渲染小组积分栏
        function renderGroupScores() {
            const scores = getGroupScores();
            const container = document.getElementById('groupScoreList');
            container.innerHTML = '';
            scores.forEach((score, idx) => {
                const item = document.createElement('div');
                item.className = 'group-score-item';
                item.innerHTML = `<span>${idx+1}</span> 第${idx+1}组 ${score}分`;
                container.appendChild(item);
            });
        }

        // 渲染所有小组及座位
        function renderGroups() {
            const container = document.getElementById('groupsContainer');
            const seats = getCurrentSeats();
            let html = '';
            for (let g = 0; g < 9; g++) {
                let allAbove3 = isGroupAllAbove3(g);
                let starMark = allAbove3 ? ' ✦✦✦' : '';

                html += `<div class="group-card" data-group="${g}">`;
                html += `<div class="group-header"><span class="group-title">第${g+1}组 ${g*6+1}–${(g+1)*6}号</span>`;
                html += `<span class="group-stars">${starMark}</span>`;
                html += `<button class="plant-all-btn" data-group-action="${g}">🚀全组发射</button></div>`;

                html += `<div class="seats-grid">`;
                for (let i = 0; i < 6; i++) {
                    let seatIdx = g * 6 + i;
                    let score = seats[seatIdx];
                    let display = getSeatDisplay(score, seatIdx);
                    let flashClass = (lastUpgradedTo3Seat === seatIdx) ? 'flash-gold' : '';
                    html += `<div class="seat-card ${flashClass}" data-seat-index="${seatIdx}" id="seat-${seatIdx}">`;
                    html += `<div class="seat-number">${seatIdx+1}号</div>`;
                    html += `<div class="herb-icon">${display.icon}</div>`;
                    html += `<div class="score-badge">✦ ${score}分</div>`;
                    html += `<div class="herb-name">${display.name}</div>`;
                    html += `<div class="action-buttons">`;
                    html += `<button class="action-btn" data-action="plant" data-seat="${seatIdx}">🚀</button>`;
                    html += `<button class="action-btn" data-action="grow" data-seat="${seatIdx}">✨</button>`;
                    html += `<button class="action-btn" data-action="decrement" data-seat="${seatIdx}">🔽</button>`;
                    html += `<button class="action-btn" data-action="remove" data-seat="${seatIdx}">🗑️</button>`;
                    html += `</div></div>`;
                }
                html += `</div></div>`;
            }
            container.innerHTML = html;
            lastUpgradedTo3Seat = null;
        }

        // 渲染排名面板
        function renderRankings() {
            const seats = getCurrentSeats();
            // 小组排名
            let groupScores = [];
            for (let g = 0; g < 9; g++) {
                let total = 0;
                for (let i = 0; i < 6; i++) total += seats[g*6 + i];
                groupScores.push({ group: g+1, score: total });
            }
            groupScores.sort((a,b) => b.score - a.score);
            document.getElementById('groupRankList').innerHTML = groupScores.map(g => `<li><span>第${g.group}组</span> <span>${g.score}分</span></li>`).join('');

            // 个人排名：学号、分数、当前物品
            let personal = seats.map((score, idx) => {
                let display = getSeatDisplay(score, idx);
                return { no: idx+1, score, name: display.name };
            });
            personal.sort((a,b) => b.score - a.score);
            document.getElementById('personalRankList').innerHTML = personal.map(p => 
                `<li><span>${p.no}号 ${p.name}</span> <span>${p.score}分</span></li>`
            ).join('');
        }

        function refreshUI() {
            renderGroupScores();
            renderGroups();
            renderRankings();
        }

        // 操作函数
        function handlePlant(seatIdx) {
            let seats = getCurrentSeats();
            if (seats[seatIdx] === 0) {
                seats[seatIdx] = 1;
                playSound('add');
                checkAndCelebrate(1);
            } else return;
            refreshUI();
        }

        function handleGrow(seatIdx) {
            let seats = getCurrentSeats();
            if (seats[seatIdx] >= 1) {
                seats[seatIdx] += 1;
                let newScore = seats[seatIdx];
                if (newScore === 3) {
                    lastUpgradedTo3Seat = seatIdx;
                }
                playSound('add');
                checkAndCelebrate(newScore);
            } else return;
            refreshUI();
        }

        function handleDecrement(seatIdx) {
            let seats = getCurrentSeats();
            if (seats[seatIdx] > 0) {
                seats[seatIdx] -= 1;
                playSound('subtract');
            } else return;
            refreshUI();
        }

        function handleRemove(seatIdx) {
            let seats = getCurrentSeats();
            if (seats[seatIdx] > 0) {
                seats[seatIdx] = 0;
                playSound('subtract');
            } else return;
            refreshUI();
        }

        function handleGroupPlant(groupIdx) {
            let seats = getCurrentSeats();
            let changed = false;
            for (let i = 0; i < 6; i++) {
                let idx = groupIdx * 6 + i;
                if (seats[idx] === 0) {
                    seats[idx] = 1;
                    changed = true;
                }
            }
            if (changed) {
                playSound('add');
                refreshUI();
            }
        }

        function resetCurrentClass() {
            if (!confirm('确定重置当前班级所有发射台积分吗？')) return;
            classData[currentClass] = new Array(54).fill(0);
            saveToStorage();
            refreshUI();
        }

        function switchClass(newClass) {
            if (newClass === currentClass) return;
            saveToStorage();
            currentClass = newClass;
            refreshUI();
        }

        // 事件绑定
        function attachEvents() {
            document.addEventListener('click', (e) => {
                const target = e.target.closest('button');
                if (!target) return;

                if (target.hasAttribute('data-group-action')) {
                    e.preventDefault();
                    let group = target.getAttribute('data-group-action');
                    handleGroupPlant(parseInt(group));
                    return;
                }

                if (target.hasAttribute('data-action') && target.hasAttribute('data-seat')) {
                    e.preventDefault();
                    let action = target.getAttribute('data-action');
                    let seatIdx = parseInt(target.getAttribute('data-seat'));
                    if (action === 'plant') handlePlant(seatIdx);
                    else if (action === 'grow') handleGrow(seatIdx);
                    else if (action === 'decrement') handleDecrement(seatIdx);
                    else if (action === 'remove') handleRemove(seatIdx);
                }
            });

            document.getElementById('classSelect').addEventListener('change', (e) => {
                switchClass(e.target.value);
            });

            document.getElementById('saveBtn').addEventListener('click', () => {
                saveToStorage();
                alert('任务进度已存入航天黑匣子 🚀');
            });

            document.getElementById('resetBtn').addEventListener('click', resetCurrentClass);

            document.getElementById('rankToggleBtn').addEventListener('click', () => {
                document.getElementById('rankPanel').classList.toggle('show');
            });

            document.getElementById('instructionBtn').addEventListener('click', () => {
                document.getElementById('instructionPanel').classList.toggle('show');
            });
        }

        function init() {
            loadFromStorage();
            // 设置默认选中三年级1班
            document.getElementById('classSelect').value = currentClass;
            refreshUI();
            attachEvents();
            initAudio(); // 预创建音频上下文
        }

        init();
    })();
</script>
</body>
</html>
